# cargo-deny configuration — supply-chain gate (advisories, licenses, bans).
[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses we accept; add others deliberately as deps are introduced.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "CC0-1.0"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace path deps (regatta_supervisor -> regatta_core) have no version; allow those.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
